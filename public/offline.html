<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#100F0F" />
    <title>Sem conexão — Axtor</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #100f0f;
        color: #f4f4f5;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        max-width: 360px;
        width: 100%;
        text-align: center;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 9999px;
        background: #d4af37;
        margin: 0 auto 20px;
        box-shadow: 0 0 16px 2px rgba(212, 175, 55, 0.5);
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #a1a1aa; margin: 0 0 24px; }
      button {
        height: 44px;
        width: 100%;
        border: 1px solid rgba(212, 175, 55, 0.4);
        background: rgba(212, 175, 55, 0.12);
        color: #f4f4f5;
        font-size: 14px;
        border-radius: 12px;
        cursor: pointer;
      }
      button:hover { background: rgba(212, 175, 55, 0.2); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="dot"></div>
      <h1>Você está sem conexão</h1>
      <p>Não foi possível carregar a página agora. Verifique sua internet e tente de novo.</p>
      <button onclick="location.reload()">Tentar de novo</button>
    </div>
  </body>
</html>
